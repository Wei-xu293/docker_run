name: Docker vs Native Memory Overhead

on:
  push:
    branches: [  ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install bc for floating point arithmetic in the table
      - name: Install bc
        run: sudo apt-get update && sudo apt-get install -y bc

      # Create the memory test script (no external dependencies)
      - name: Create memtest.py
        run: |
          cat > memtest.py << 'EOF'
          import sys
          import time
          import os

          def get_rss_mb():
              with open('/proc/self/statm', 'r') as f:
                  resident_pages = int(f.readline().split()[1])
                  page_size = os.sysconf('SC_PAGE_SIZE')
                  return (resident_pages * page_size) / (1024 * 1024)

          size_mb = int(sys.argv[1])
          # Allocate list of 1 MB bytearrays
          data = [bytearray(1024 * 1024) for _ in range(size_mb)]

          rss = get_rss_mb()
          print(f"{rss:.2f}")
          # Keep memory alive for a few seconds so docker stats could also capture
          time.sleep(2)
          EOF

      # Run comparison for different memory sizes
      - name: Compare native vs Docker
        run: |
          echo "| Size (MB) | Native RSS (MB) | Docker RSS (MB) | Overhead (MB) |"
          echo "|-----------|----------------|-----------------|---------------|"
          for size in 50 100 150 200 250; do
            # Native run
            native=$(python3 memtest.py $size)
            # Docker run (no limit)
            docker=$(docker run --rm -v $PWD:/app -w /app python:3-slim python /app/memtest.py $size)
            overhead=$(echo "$docker - $native" | bc)
            printf "| %9s | %14s | %15s | %13s |\n" "$size" "$native" "$docker" "$overhead"
            # Save raw data for artifact
            echo "$size, $native, $docker, $overhead" >> raw_stats.txt
          done

      # (Optional) Test OOM behaviour with memory limit
      - name: Test OOM with 200MB limit (allocating 300MB)
        run: |
          echo "--- OOM Test ---"
          docker run --rm --memory=200m -v $PWD:/app -w /app python:3-slim python /app/memtest.py 300
          # The above will fail with exit code 137 (OOM kill)
          echo "Exit code: $? (137 indicates OOM kill)"
          # Save exit code for documentation
          docker run --rm --memory=200m -v $PWD:/app -w /app python:3-slim python /app/memtest.py 300 || echo "OOM killed as expected" > oom_result.txt

      # Upload all raw data as an artifact
      - name: Upload stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory-overhead-results
          path: |
            raw_stats.txt
            oom_result.txt