name: Docker vs Native Memory

on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create memtest.py
        run: |
          cat > memtest.py << 'EOF'
          import sys, time, os
          def get_rss_mb():
              with open('/proc/self/statm') as f:
                  resident_pages = int(f.readline().split()[1])
                  page_size = os.sysconf('SC_PAGE_SIZE')
                  return (resident_pages * page_size) / (1024 * 1024)
          size_mb = int(sys.argv[1])
          data = [bytearray(1024*1024) for _ in range(size_mb)]
          print(f"RSS: {get_rss_mb():.2f} MB")
          time.sleep(2)
          EOF

      - name: Native run
        run: python3 memtest.py 150

      - name: Docker run (no limit)
        run: docker run --rm -v $PWD:/app -w /app python:3-slim python /app/memtest.py 150

      - name: Docker run with 200MB limit (allocating 300MB)
        run: docker run --rm --memory=200m -v $PWD:/app -w /app python:3-slim python /app/memtest.py 300 || true