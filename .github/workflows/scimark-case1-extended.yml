name: SciMark2 - Case1 Extended Benchmark

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Número de ejecuciones medidas (excluye warmup)'
        required: false
        default: '20'
      warmup:
        description: 'Ejecuciones de calentamiento'
        required: false
        default: '2'
      sleep:
        description: 'Segundos de espera antes de medir (debe ser < Idle sleep)'
        required: false
        default: '2'
      image:
        description: 'Imagen Docker Java a usar'
        required: false
        default: 'eclipse-temurin:11-jdk-ubi9-minimal'

jobs:
  case1-extended:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (this repo)
        uses: actions/checkout@v5

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y bc time python3 python3-pip jq

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: '3.9.6'

      - name: Checkout SciMark2 repository
        uses: actions/checkout@v5
        with:
          repository: 'mork-optimization/scimark'
          path: 'scimark'

      - name: Build SciMark2
        run: |
          cd scimark
          mvn -q clean package

      - name: Create Idle.java
        run: |
          cat > Idle.java <<'EOF'
          public class Idle {
              public static void main(String[] args) throws InterruptedException {
                  Thread.sleep(10000);  // idle for 10 seconds
              }
          }
          EOF
          javac Idle.java

      - name: Create benchmark script (bench_case1.sh)
        run: |
          cat > bench_case1.sh <<'EOF'
          #!/usr/bin/env bash
          set -eu

          ITER=${1:-${INPUT_ITERATIONS:-20}}
          WARMUP=${2:-${INPUT_WARMUP:-2}}
          SLEEP=${3:-${INPUT_SLEEP:-2}}
          IMAGE=${4:-${INPUT_IMAGE:-eclipse-temurin:11-jdk-ubi9-minimal}}
          OUT=case1_idle_results.csv
          LOGDIR=case1_logs
          mkdir -p "$LOGDIR"

          echo "scenario,iter,timestamp,rss_kb,pss_mb,docker_mem_mb,docker_mem_raw,exit_code,notes,meta" > $OUT

          pss_from_smaps() {
            PID=$1
            awk '/Pss:/ {s+= $2} END {printf("%.2f", s/1024)}' /proc/$PID/smaps 2>/dev/null || echo "0.00"
          }

          # helpers to read docker mem usage (normalise first token)
          docker_mem_mb_from_raw() {
            raw="$1"
            token=$(echo "$raw" | awk '{print $1}')
            if echo "$token" | grep -q GiB; then
              val=$(echo $token | sed 's/GiB//' | awk '{print $1 * 1024}')
              echo "$val"
            elif echo "$token" | grep -q MiB; then
              echo $(echo $token | sed 's/MiB//')
            elif echo "$token" | grep -q KiB; then
              echo "$(awk "BEGIN{print $(echo $token | sed 's/KiB//')/1024}")"
            else
              echo "0"
            fi
          }

          total=$((WARMUP + ITER))
          for i in $(seq 1 $total); do
            note=""
            if [ "$i" -le "$WARMUP" ]; then
              note="warmup"
            fi

            # randomize order to reduce bias
            if [ $((RANDOM % 2)) -eq 0 ]; then
              order=(native docker)
            else
              order=(docker native)
            fi

            for scenario in "${order[@]}"; do
              if [ "$scenario" = "native" ]; then
                # Native run
                java Idle &
                NPID=$!
                sleep $SLEEP
                rss_kb=$(grep -i VmRSS /proc/$NPID/status 2>/dev/null | awk '{print $2}' || echo 0)
                pss_mb=$(pss_from_smaps $NPID)
                kill $NPID 2>/dev/null || true
                wait $NPID 2>/dev/null || true
                meta="$(uname -a) | $(lscpu | head -n1)"
                echo "native,$i,$(date +%s),${rss_kb:-0},${pss_mb},,,0,${note},\"${meta}\"" >> $OUT
                echo "native $i: rss=${rss_kb} kb, pss=${pss_mb} MB" >> "$LOGDIR/native_$i.log"
              else
                # Docker run
                cname="idle_run_${i}_$RANDOM"
                docker run -d --name "$cname" -v "$PWD":/app -w /app "$IMAGE" java Idle >/dev/null
                sleep $SLEEP
                docker_mem_raw=$(docker stats --no-stream --format "{{.MemUsage}}" "$cname" 2>/dev/null || echo "")
                docker_mem_mb=$(docker_mem_mb_from_raw "$docker_mem_raw")
                # try to get PSS inside container (PID 1 expected to be java)
                docker_pss_mb=$(docker exec "$cname" sh -c "awk '/Pss:/ {s+=\\$2} END {printf(\"%.2f\", s/1024)}' /proc/1/smaps 2>/dev/null" || echo "0.00")
                exit_code=0
                docker rm -f "$cname" >/dev/null 2>&1 || exit_code=$?
                meta="docker_image=${IMAGE}"
                echo "docker,$i,$(date +%s),,${docker_pss_mb},${docker_mem_mb},\"${docker_mem_raw}\",${exit_code},${note},\"${meta}\"" >> $OUT
                echo "docker $i: docker_mem=${docker_mem_mb} MB, pss=${docker_pss_mb} MB" >> "$LOGDIR/docker_$i.log"
              fi
              # small settle
              sleep 1
            done
          done

          echo "Benchmark finished. Results: $OUT"
          ls -l $OUT $LOGDIR || true
          EOF
          chmod +x bench_case1.sh

      - name: Run benchmark script
        env:
          INPUT_ITERATIONS: ${{ github.event.inputs.iterations }}
          INPUT_WARMUP: ${{ github.event.inputs.warmup }}
          INPUT_SLEEP: ${{ github.event.inputs.sleep }}
          INPUT_IMAGE: ${{ github.event.inputs.image }}
        run: |
          ./bench_case1.sh ${INPUT_ITERATIONS} ${INPUT_WARMUP} ${INPUT_SLEEP} "${INPUT_IMAGE}"

      - name: Create analysis script (analyze_case1.py)
        run: |
          cat > analyze_case1.py <<'PY'
          import pandas as pd
          import numpy as np
          import seaborn as sns
          import matplotlib.pyplot as plt
          from scipy import stats

          df = pd.read_csv('case1_idle_results.csv')
          df['pss_mb'] = pd.to_numeric(df['pss_mb'], errors='coerce').fillna(0)
          df['rss_kb'] = pd.to_numeric(df['rss_kb'], errors='coerce').fillna(0)
          df['docker_mem_mb'] = pd.to_numeric(df['docker_mem_mb'], errors='coerce').fillna(0)

          meas = df[~df['notes'].str.contains('warmup', na=False)]

          def stats_summary(a):
              a = a.dropna()
              n = len(a)
              if n==0:
                  return {'n':0}
              mean = a.mean()
              med = a.median()
              std = a.std()
              se = std / np.sqrt(n) if n>0 else np.nan
              ci = stats.t.interval(0.95, n-1, loc=mean, scale=se) if n>1 else (np.nan, np.nan)
              return {'n':n,'mean':mean,'median':med,'std':std,'ci95_low':ci[0],'ci95_high':ci[1]}

          grouped = meas.groupby('scenario')
          for name, g in grouped:
              print('---', name)
              print(stats_summary(g['pss_mb']))
              print(stats_summary(g['rss_kb']))

          plt.figure(figsize=(6,4))
          sns.boxplot(data=meas, x='scenario', y='pss_mb')
          plt.title('PSS distribution (MB) — Case1 idle')
          plt.savefig('case1_pss_boxplot.png', bbox_inches='tight')

          plt.figure(figsize=(6,4))
          sns.histplot(data=meas, x='pss_mb', hue='scenario', kde=True, stat='density', element='step')
          plt.title('PSS histogram (MB)')
          plt.savefig('case1_pss_hist.png', bbox_inches='tight')

          print('Saved plots: case1_pss_boxplot.png, case1_pss_hist.png')
          PY

      - name: Install Python deps for analysis
        run: |
          python3 -m pip install --user pandas seaborn matplotlib scipy

      - name: Run analysis
        run: |
          python3 analyze_case1.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: case1-extended-results
          path: |
            case1_idle_results.csv
            case1_logs
            case1_pss_boxplot.png
            case1_pss_hist.png
