name: SciMark2 - Docker vs Native Memory Overhead

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      # ---------- Setup ----------
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y bc time

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: '3.9.6'

      - name: Checkout SciMark2 repository
        uses: actions/checkout@v5
        with:
          repository: 'mork-optimization/scimark'
          path: 'scimark'

      - name: Build SciMark2 with Maven
        run: |
          cd scimark
          mvn clean package

      # ========== CASE 4: Horizontal scaling (REFIXED) ==========
      - name: Case 4 - Horizontal scaling (3 instances)
        run: |
          cd scimark
          echo "=== Case 4: Measuring Peak Memory Usage ==="

          # 1. NATIVE PEAK MEASUREMENT
          echo "Running 3 native instances..."
          native_peaks=()
          for i in {1..3}; do
            # Usamos /usr/bin/time -v para capturar el 'Maximum resident set size'
            /usr/bin/time -v java -jar target/scimark-2.3-SNAPSHOT.jar > native_$i.log 2>&1 &
            pids+=($!)
          done
          
          wait ${pids[@]} # Esperamos a que todos terminen para tener el dato final

          total_native_mb=0
          for i in {1..3}; do
            # Extraemos el valor en KB y lo pasamos a MB
            peak_kb=$(grep "Maximum resident set size" native_$i.log | awk '{print $6}')
            peak_mb=$(echo "scale=2; $peak_kb / 1024" | bc)
            total_native_mb=$(echo "$total_native_mb + $peak_mb" | bc)
          done
          echo "Native 3 instances total peak: $total_native_mb MB"

          # 2. DOCKER PEAK MEASUREMENT
          echo "Running 3 docker instances..."
          total_docker_mb=0
          for i in {1..3}; do
            # Ejecutamos time -v DENTRO del contenedor
            # Usamos 'debian' o 'ubi-minimal' que incluyan /usr/bin/time
            docker run --name scimark_$i -v $PWD:/app -w /app eclipse-temurin:11-jdk-ubi9-minimal \
              /usr/bin/time -v java -jar /app/target/scimark-2.3-SNAPSHOT.jar > docker_$i.log 2>&1
          done

          for i in {1..3}; do
            peak_kb=$(grep "Maximum resident set size" docker_$i.log | awk '{print $6}')
            peak_mb=$(echo "scale=2; $peak_kb / 1024" | bc)
            total_docker_mb=$(echo "$total_docker_mb + $peak_mb" | bc)
            docker rm scimark_$i > /dev/null
          done
          echo "Docker 3 instances total peak: $total_docker_mb MB"

          # 3. CALCULATION
          overhead=$(echo "$total_docker_mb - $total_native_mb" | bc)
          echo "Horizontal scaling REAL overhead: $overhead MB"
          
          # Guardar resultados
          echo "CASE4: native_3_total_mb=$total_native_mb, docker_3_total_mb=$total_docker_mb, overhead_mb=$overhead" >> ../results.txt

      # ---------- Upload all results ----------
      - name: Upload experiment results
        uses: actions/upload-artifact@v7
        with:
          name: scimark-results
          path: |
            results.txt