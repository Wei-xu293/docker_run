name: SciMark2 - Case1 Simple Benchmark

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Número de ejecuciones medidas por escenario'
        required: false
        default: '5'
      sleep:
        description: 'Segundos de espera antes de medir'
        required: false
        default: '2'
      image:
        description: 'Imagen Docker Java a usar'
        required: false
        default: 'eclipse-temurin:11-jdk-ubi9-minimal'

jobs:
  case1-simple:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Create tiny Idle program
        run: |
          cat > Idle.java <<'EOF'
          public class Idle { public static void main(String[] args) throws InterruptedException { Thread.sleep(5000); } }
          EOF
          javac Idle.java

      - name: Run quick Case1 iterations (collect PSS)
        env:
          ITERATIONS: ${{ github.event.inputs.iterations }}
          SLEEP: ${{ github.event.inputs.sleep }}
          IMAGE: ${{ github.event.inputs.image }}
        run: |
          set -euo pipefail
          ITER=${ITERATIONS:-5}
          SLEEP=${SLEEP:-2}
          IMAGE=${IMAGE:-eclipse-temurin:11-jdk-ubi9-minimal}
          OUT=case1_simple_results.txt
          echo "scenario,iter,timestamp,rss_kb,pss_mb,docker_rss_kb,docker_pss_mb,docker_host_rss_kb,docker_host_pss_mb,docker_mem_mb,docker_mem_raw,exit_code" > $OUT

          pss_from_smaps() {
            PID=$1
            awk '/Pss:/ {s+= $2} END {printf("%.2f", s/1024)}' /proc/$PID/smaps 2>/dev/null || echo "0.00"
          }

          for i in $(seq 1 $ITER); do
            # Native
            java Idle &
            PID=$!
            sleep $SLEEP
            rss_kb=$(grep -i VmRSS /proc/$PID/status 2>/dev/null | awk '{print $2}' || echo 0)
            pss_native=$(pss_from_smaps $PID)
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            # Emit full 12-column CSV line: leave docker-related fields empty for native rows
            echo "native,$i,$(date +%s),${rss_kb},${pss_native},,,,,,0" >> $OUT

            # Docker: start container detached with a name so we can inspect host PID/smaps
            cname="idle_${i}_$$"
            docker_raw=""
            docker_mb=0
            docker_rss_kb=0
            docker_pss_mb="0.00"
            docker_host_rss_kb=0
            docker_host_pss_mb="0.00"

            docker run -d --privileged --name "$cname" -v $PWD:/app -w /app "$IMAGE" sh -c 'java Idle & sleep 600' >/dev/null
            sleep ${SLEEP}

            # Attempt to find the host PID for the java process inside the container
            host_pid=$(docker top "$cname" -eo pid,cmd 2>/dev/null | awk '/java/ {print $1; exit}' || true)
            if [ -n "$host_pid" ]; then
              docker_host_rss_kb=$(grep -i VmRSS /proc/$host_pid/status 2>/dev/null | awk '{print $2}' || echo 0)
              docker_host_pss_mb=$(awk '/Pss:/ {s+=$2} END {printf("%.2f", s/1024)}' /proc/$host_pid/smaps 2>/dev/null || echo "0.00")
              docker_rss_kb=$docker_host_rss_kb
              docker_pss_mb=$docker_host_pss_mb
            fi

            # If PSS is 0.00, capture debug info to help diagnose permission/availability
            if [ "${docker_pss_mb}" = "0.00" ] || [ "${docker_host_pss_mb}" = "0.00" ]; then
              mkdir -p debug_logs
              docker top "$cname" -eo pid,cmd > debug_logs/${cname}_top.txt 2>&1 || true
              docker inspect "$cname" > debug_logs/${cname}_inspect.json 2>&1 || true
              if [ -n "$host_pid" ]; then
                cp /proc/$host_pid/status debug_logs/${cname}_host_status.txt 2>/dev/null || true
                head -n 200 /proc/$host_pid/smaps > debug_logs/${cname}_host_smaps_head.txt 2>/dev/null || true
              else
                echo "host_pid empty; cannot read /proc/<hostpid>/smaps" > debug_logs/${cname}_host_smaps_head.txt || true
              fi
            fi

            # Get docker memory usage for the container
            docker_raw=$(docker stats --no-stream --format "{{.MemUsage}}" "$cname" 2>/dev/null || echo "")
            token=$(echo "$docker_raw" | awk '{print $1}')
            if echo "$token" | grep -q GiB; then
              docker_mb=$(echo $token | sed 's/GiB//' | awk '{print $1 * 1024}')
            elif echo "$token" | grep -q MiB; then
              docker_mb=$(echo $token | sed 's/MiB//')
            elif echo "$token" | grep -q KiB; then
              docker_mb=$(awk "BEGIN{print $(echo $token | sed 's/KiB//')/1024}")
            fi

            # Stop and remove the container now that we've captured host-side metrics
            exit_code=0
            docker rm -f "$cname" >/dev/null 2>&1 || exit_code=$?
            echo "docker,$i,$(date +%s),,,${docker_rss_kb},${docker_pss_mb},${docker_host_rss_kb},${docker_host_pss_mb},${docker_mb},\"${docker_raw}\",${exit_code}" >> $OUT
          done

          echo "Results saved to $OUT"

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: case1-simple-results
          path: |
            case1_simple_results.txt
            debug_logs/**
